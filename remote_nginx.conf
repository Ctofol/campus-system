server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/campus-sports;
    index index.html;

    # 小程序 / fronted 生产 BASE_URL 为 https://域名/api（见 fronted/utils/request.js）
    # 将 /api/ 前缀剥掉后转发到 FastAPI 根路径，否则 /api/auth/login 会落到静态站 404
    location /api/ {
        proxy_pass http://127.0.0.1:18721/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:18721/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /common/ {
        proxy_pass http://127.0.0.1:18721/common/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /activity/ {
        proxy_pass http://127.0.0.1:18721/activity/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /teacher/ {
        proxy_pass http://127.0.0.1:18721/teacher/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /student/ {
        proxy_pass http://127.0.0.1:18721/student/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /courses/ {
        proxy_pass http://127.0.0.1:18721/courses/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /run-group/ {
        proxy_pass http://127.0.0.1:18721/run-group/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload/ {
        proxy_pass http://127.0.0.1:18721/upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 100M;
    }

    location /users/ {
        proxy_pass http://127.0.0.1:18721/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /checkpoints {
        proxy_pass http://127.0.0.1:18721/common/checkpoints;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:18721/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
