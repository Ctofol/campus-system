<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>校园管理系统 - 管理端</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css"/>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.login-wrap{display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f2f5}
.login-card{background:#fff;padding:40px;border-radius:8px;width:400px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.logo{font-size:28px;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:#666;margin-bottom:24px;font-size:16px}
.layout{display:flex;height:100vh}
.sider{width:200px;background:#001529;flex-shrink:0;display:flex;flex-direction:column}
.sider-logo{color:#fff;text-align:center;padding:20px 10px;font-size:16px;font-weight:bold;border-bottom:1px solid #333}
.nav-item{color:#ccc;padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;transition:all .2s}
.nav-item:hover,.nav-item.active{color:#fff;background:#1890ff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{background:#fff;border-bottom:1px solid #eee;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{flex:1;overflow:auto;padding:20px;background:#f0f2f5}
.card{background:#fff;border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-weight:600;font-size:16px}
.stat-row{display:flex;gap:16px;margin-bottom:16px}
.stat-card{flex:1;background:#fff;border-radius:4px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px}
.stat-num{font-size:28px;font-weight:bold}
.stat-label{color:#666;font-size:14px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const { createApp, ref, reactive, watch, onMounted } = Vue;
const { ElMessage, ElMessageBox } = ElementPlus;
const BASE_URL = 'http://101.37.24.171:8001';
const api = axios.create({ baseURL: BASE_URL });
api.interceptors.request.use(c => {
  const t = localStorage.getItem('admin_token');
  if (t) c.headers.Authorization = 'Bearer ' + t;
  return c;
});
api.interceptors.response.use(r => r.data, e => {
  if (e.response && (e.response.status === 401 || e.response.status === 403)) {
    localStorage.clear(); window.location.reload();
  }
  return Promise.reject(e.response ? e.response.data : e);
});

const app = createApp({
  setup() {
    const page = ref(localStorage.getItem('admin_token') ? 'dashboard' : 'login');
    const loginForm = reactive({ phone: '', password: '' });
    const loginLoading = ref(false);
    const adminInfo = ref(JSON.parse(localStorage.getItem('admin_info') || '{"name":"\u7ba1\u7406\u5458"}'));
    const stats = ref({ total_students:0, total_teachers:0, total_classes:0, pending_approvals:0 });
    const classes = ref([]);
    const showClassDialog = ref(false);
    const newClassName = ref('');
    const users = ref([]);
    const userRole = ref('student');
    const importing = reactive({ student:false, teacher:false });

    const nav = (p) => {
      page.value = p;
      if (p === 'dashboard') loadStats();
      if (p === 'classes') loadClasses();
      if (p === 'users') loadUsers();
    };

    const handleLogin = async () => {
      loginLoading.value = true;
      try {
        const res = await api.post('/auth/login', loginForm);
        localStorage.setItem('admin_token', res.access_token);
        localStorage.setItem('admin_info', JSON.stringify({ name: res.name }));
        adminInfo.value = { name: res.name };
        try { const r = await api.post('/auth/refresh'); localStorage.setItem('admin_token', r.access_token); } catch(e) {}
        nav('dashboard');
      } catch(e) { ElMessage.error((e && e.detail) ? e.detail : '\u767b\u5f55\u5931\u8d25'); }
      finally { loginLoading.value = false; }
    };

    const logout = () => { localStorage.clear(); page.value = 'login'; };

    const loadStats = async () => {
      try { stats.value = await api.get('/admin/dashboard/stats'); } catch(e) {}
    };

    const loadClasses = async () => {
      try { classes.value = await api.get('/admin/classes'); } catch(e) {}
    };

    const createClass = async () => {
      if (!newClassName.value) return;
      try {
        await api.post('/admin/classes', { name: newClassName.value });
        ElMessage.success('\u521b\u5efa\u6210\u529f');
        showClassDialog.value = false;
        newClassName.value = '';
        loadClasses();
      } catch(e) { ElMessage.error((e && e.detail) ? e.detail : '\u521b\u5efa\u5931\u8d25'); }
    };

    const deleteClass = async (row) => {
      try {
        await ElMessageBox.confirm('\u786e\u5b9a\u5220\u9664\u73ed\u7ea7\u300c' + row.name + '\u300d\uff1f', '\u786e\u8ba4', { type: 'warning' });
        await api.delete('/admin/classes/' + row.id);
        ElMessage.success('\u5220\u9664\u6210\u529f');
        loadClasses();
      } catch(e) { if (e !== 'cancel') ElMessage.error((e && e.detail) ? e.detail : '\u5220\u9664\u5931\u8d25'); }
    };

    const loadUsers = async () => {
      try { users.value = await api.get('/admin/users', { params: { role: userRole.value } }); } catch(e) {}
    };

    const resetPwd = async (row) => {
      try {
        await ElMessageBox.confirm('\u91cd\u7f6e\u300c' + row.name + '\u300d\u7684\u5bc6\u7801\u4e3a 123456\uff1f', '\u786e\u8ba4');
        await api.post('/admin/users/' + row.id + '/reset-password');
        ElMessage.success('\u91cd\u7f6e\u6210\u529f');
      } catch(e) { if (e !== 'cancel') ElMessage.error((e && e.detail) ? e.detail : '\u5931\u8d25'); }
    };

    const deleteUser = async (row) => {
      try {
        await ElMessageBox.confirm('\u786e\u5b9a\u5220\u9664\u7528\u6237\u300c' + row.name + '\u300d\uff1f', '\u786e\u8ba4', { type: 'warning' });
        await api.delete('/admin/users/' + row.id);
        ElMessage.success('\u5220\u9664\u6210\u529f');
        loadUsers();
      } catch(e) { if (e !== 'cancel') ElMessage.error((e && e.detail) ? e.detail : '\u5220\u9664\u5931\u8d25'); }
    };

    const handleImport = async (file, type) => {
      importing[type] = true;
      const form = new FormData();
      form.append('file', file);
      try {
        const url = type === 'student' ? '/admin/import/students' : '/admin/import/teachers';
        const data = await api.post(url, form, { headers: { 'Content-Type': 'multipart/form-data' } });
        ElMessage.success('\u5bfc\u5165\u5b8c\u6210\uff1a\u6210\u529f ' + data.success + ' \u6761\uff0c\u5931\u8d25 ' + data.failed + ' \u6761');
      } catch(e) { ElMessage.error((e && e.detail) ? e.detail : '\u5bfc\u5165\u5931\u8d25'); }
      finally { importing[type] = false; }
      return false;
    };

    const downloadTpl = (type) => {
      const url = BASE_URL + (type === 'student' ? '/admin/import/template/students' : '/admin/import/template/teachers');
      const a = document.createElement('a');
      a.href = url;
      a.download = type === 'student' ? '\u5b66\u751f\u5bfc\u5165\u6a21\u677f.xlsx' : '\u6559\u5e08\u5bfc\u5165\u6a21\u677f.xlsx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };

    watch(userRole, loadUsers);
    onMounted(() => { if (page.value !== 'login') loadStats(); });

    return {
      page, loginForm, loginLoading, adminInfo, stats,
      classes, showClassDialog, newClassName,
      users, userRole, importing,
      nav, handleLogin, logout,
      loadClasses, createClass, deleteClass,
      loadUsers, resetPwd, deleteUser,
      handleImport, downloadTpl
    };
  },
  template: `
    <div v-if="page==='login'" class="login-wrap">
      <div class="login-card">
        <div class="logo">🏫 校园管理系统</div>
        <div class="subtitle">管理员登录</div>
        <el-form @submit.prevent="handleLogin">
          <el-form-item><el-input v-model="loginForm.phone" placeholder="手机号" size="large"/></el-form-item>
          <el-form-item><el-input v-model="loginForm.password" type="password" placeholder="密码" size="large" show-password/></el-form-item>
          <el-button type="primary" native-type="submit" size="large" style="width:100%" :loading="loginLoading">登 录</el-button>
        </el-form>
      </div>
    </div>
    <div v-else class="layout">
      <div class="sider">
        <div class="sider-logo">🏫 管理端</div>
        <div class="nav-item" :class="{active:page==='dashboard'}" @click="nav('dashboard')">📊 控制台</div>
        <div class="nav-item" :class="{active:page==='classes'}" @click="nav('classes')">🏫 班级管理</div>
        <div class="nav-item" :class="{active:page==='users'}" @click="nav('users')">👥 账号管理</div>
        <div class="nav-item" :class="{active:page==='import'}" @click="nav('import')">📥 批量导入</div>
      </div>
      <div class="main">
        <div class="header">
          <span style="font-size:16px;font-weight:600">{{ {dashboard:'控制台',classes:'班级管理',users:'账号管理',import:'批量导入'}[page] }}</span>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="color:#666">{{ adminInfo.name }}</span>
            <el-button size="small" @click="logout">退出</el-button>
          </div>
        </div>
        <div class="content">
          <div v-if="page==='dashboard'">
            <div class="stat-row">
              <div class="stat-card"><div style="font-size:32px">👨‍🎓</div><div><div class="stat-num" style="color:#409eff">{{stats.total_students}}</div><div class="stat-label">学生总数</div></div></div>
              <div class="stat-card"><div style="font-size:32px">👨‍🏫</div><div><div class="stat-num" style="color:#67c23a">{{stats.total_teachers}}</div><div class="stat-label">教师总数</div></div></div>
              <div class="stat-card"><div style="font-size:32px">🏫</div><div><div class="stat-num" style="color:#e6a23c">{{stats.total_classes}}</div><div class="stat-label">班级总数</div></div></div>
              <div class="stat-card"><div style="font-size:32px">🔔</div><div><div class="stat-num" style="color:#f56c6c">{{stats.pending_approvals}}</div><div class="stat-label">待审批</div></div></div>
            </div>
            <div class="card">
              <div class="card-header">快捷操作</div>
              <el-space>
                <el-button type="primary" @click="nav('classes')">班级管理</el-button>
                <el-button type="primary" @click="nav('users')">账号管理</el-button>
                <el-button type="primary" @click="nav('import')">批量导入</el-button>
              </el-space>
            </div>
          </div>
          <div v-if="page==='classes'">
            <div class="card">
              <div class="card-header">班级列表 <el-button type="primary" @click="showClassDialog=true">+ 新增班级</el-button></div>
              <el-table :data="classes" stripe border>
                <el-table-column prop="id" label="ID" width="70"/>
                <el-table-column prop="name" label="班级名称"/>
                <el-table-column prop="teacher_id" label="绑定教师ID" width="120"><template #default="{row}">{{row.teacher_id||'-'}}</template></el-table-column>
                <el-table-column prop="student_count" label="学生人数" width="100"/>
                <el-table-column label="操作" width="100"><template #default="{row}"><el-button type="danger" size="small" @click="deleteClass(row)">删除</el-button></template></el-table-column>
              </el-table>
            </div>
          </div>
          <div v-if="page==='users'">
            <div class="card">
              <div class="card-header">
                账号列表
                <el-radio-group v-model="userRole" size="small">
                  <el-radio-button label="student">学生</el-radio-button>
                  <el-radio-button label="teacher">教师</el-radio-button>
                </el-radio-group>
              </div>
              <el-table :data="users" stripe border>
                <el-table-column prop="name" label="姓名" width="120"/>
                <el-table-column prop="phone" label="手机号" width="150"/>
                <el-table-column label="班级/工号"><template #default="{row}">{{userRole==='student'?row.class_name:row.student_id}}</template></el-table-column>
                <el-table-column label="操作" width="180">
                  <template #default="{row}">
                    <el-button size="small" @click="resetPwd(row)">重置密码</el-button>
                    <el-button size="small" type="danger" @click="deleteUser(row)">删除</el-button>
                  </template>
                </el-table-column>
              </el-table>
            </div>
          </div>
          <div v-if="page==='import'">
            <div style="display:flex;gap:16px">
              <div class="card" style="flex:1">
                <div class="card-header">批量导入学生</div>
                <p style="color:#666;font-size:14px;margin-bottom:16px">Excel 列：姓名、手机号、密码、学号、所属班级名称</p>
                <el-space direction="vertical">
                  <el-upload :before-upload="f=>handleImport(f,'student')" :show-file-list="false" accept=".xls,.xlsx">
                    <el-button type="primary" :loading="importing.student">选择文件并导入</el-button>
                  </el-upload>
                  <el-button @click="downloadTpl('student')">下载学生模板</el-button>
                </el-space>
              </div>
              <div class="card" style="flex:1">
                <div class="card-header">批量导入教师</div>
                <p style="color:#666;font-size:14px;margin-bottom:16px">Excel 列：姓名、手机号、密码、工号</p>
                <el-space direction="vertical">
                  <el-upload :before-upload="f=>handleImport(f,'teacher')" :show-file-list="false" accept=".xls,.xlsx">
                    <el-button type="primary" :loading="importing.teacher">选择文件并导入</el-button>
                  </el-upload>
                  <el-button @click="downloadTpl('teacher')">下载教师模板</el-button>
                </el-space>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <el-dialog v-model="showClassDialog" title="新增班级" width="400px">
      <el-input v-model="newClassName" placeholder="请输入班级名称"/>
      <template #footer>
        <el-button @click="showClassDialog=false">取消</el-button>
        <el-button type="primary" @click="createClass">确定</el-button>
      </template>
    </el-dialog>
  `
});
app.use(ElementPlus);
for (const [k,v] of Object.entries(ElementPlusIconsVue)) app.component(k,v);
app.mount('#app');
</script>
</body>
</html>
